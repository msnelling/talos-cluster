apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "minecraft-server.name" . }}
  labels:
    {{- include "minecraft-server.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "minecraft-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "minecraft-server.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "minecraft-server.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          tty: true
          stdin: true
          ports:
            - name: bedrock
              containerPort: 19132
              protocol: UDP
            - name: bedrock-tcp
              containerPort: 19132
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "minecraft-server.name" . }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - mc-monitor
                - status-bedrock
                - --host
                - "127.0.0.1"
                - --port
                - "19132"
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "minecraft-server.name" . }}-data
