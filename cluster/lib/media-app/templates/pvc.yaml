{{- if .Values.persistence.config.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "media-app.name" . }}-config
  labels:
    {{- include "media-app.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOncePod
  {{- if .Values.persistence.config.existingVolume }}
  storageClassName: longhorn
  volumeName: {{ .Values.persistence.config.existingVolume }}
  {{- else if .Values.persistence.config.storageClass }}
  storageClassName: {{ .Values.persistence.config.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.config.size }}
{{- end }}
