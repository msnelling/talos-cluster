{{- if and .Values.persistence.config.enabled .Values.persistence.config.existingVolume }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.persistence.config.existingVolume }}
  labels:
    {{- include "media-app.labels" . | nindent 4 }}
spec:
  capacity:
    storage: {{ .Values.persistence.config.size }}
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOncePod
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn
  csi:
    driver: driver.longhorn.io
    fsType: ext4
    volumeHandle: {{ .Values.persistence.config.existingVolume }}
{{- end }}
