image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

containerPort: 8080

env: {}

envFromSecret: ""

persistence:
  config:
    enabled: true
    size: 1Gi
    mountPath: /config
    storageClass: ""
    existingVolume: ""
  media:
    enabled: false
    claimName: media-share
    mountPath: /media
    subPath: ""

extraPorts: []
extraVolumes: []
extraVolumeMounts: []

httproute:
  enabled: true
  hostname: db3000.xmple.io
  path: /

service:
  port: 80

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 256Mi

sidecars: []
