media-app:
  image:
    repository: fallenbagel/jellyseerr
    tag: "2.7.3"
    pullPolicy: Always
  containerPort: 5055
  env:
    TZ: Europe/London
  envFromSecret: jellyseerr-db-secrets
  persistence:
    config:
      size: 1Gi
      existingVolume: db3000-jellyseerr-config
      mountPath: /app/config
  resources:
    requests:
      memory: 1Gi
    limits:
      memory: 1Gi
