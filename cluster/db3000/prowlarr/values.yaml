media-app:
  image:
    repository: ghcr.io/linuxserver/prowlarr
    tag: "2.3.5"
  containerPort: 9696
  env:
    TZ: Europe/London
    PUID: "568"
    PGID: "1001"
    UMASK: "007"
  persistence:
    config:
      existingVolume: db3000-prowlarr-config
  httproute:
    path: /prowlarr
  resources:
    requests:
      memory: 384Mi
    limits:
      memory: 384Mi
