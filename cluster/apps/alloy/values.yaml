alloy:
  alloy:
    stabilityLevel: experimental
    configMap:
      content: |
        // Receive Talos machine logs via raw UDP (json_lines format)
        loki.source.syslog "talos" {
          listener {
            address       = "127.0.0.1:1514"
            protocol      = "udp"
            syslog_format = "raw"
            labels        = {
              source = "talos",
              node   = sys.env("HOSTNAME"),
            }
          }
          forward_to = [loki.process.talos.receiver]
        }

        // Parse Talos JSON log fields and extract labels
        loki.process "talos" {
          forward_to = [loki.write.default.receiver]

          stage.json {
            expressions = {
              msg           = "msg",
              talos_level   = "\"talos-level\"",
              talos_service = "\"talos-service\"",
              talos_time    = "\"talos-time\"",
            }
          }

          stage.timestamp {
            source = "talos_time"
            format = "2006-01-02T15:04:05.999999999Z07:00"
          }

          stage.labels {
            values = {
              level   = "talos_level",
              service = "talos_service",
            }
          }

          stage.output {
            source = "msg"
          }
        }

        // Discover and collect pod logs
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "pods" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }
        }

        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.pods.output
          forward_to = [loki.write.default.receiver]
        }

        // Standard syslog receiver (RFC3164) — port 1515, exposed as 514
        loki.source.syslog "syslog" {
          listener {
            address       = "0.0.0.0:1515"
            protocol      = "udp"
            syslog_format = "rfc3164"
            labels        = { source = "syslog" }
            rfc3164_default_to_current_year = true
          }
          listener {
            address       = "0.0.0.0:1515"
            protocol      = "tcp"
            syslog_format = "rfc3164"
            labels        = { source = "syslog" }
            rfc3164_default_to_current_year = true
          }
          forward_to = [loki.process.syslog.receiver]
        }

        loki.process "syslog" {
          forward_to = [loki.write.default.receiver]

          stage.labels {
            values = {
              hostname = "__syslog_message_hostname",
              appname  = "__syslog_message_app_name",
              facility = "__syslog_message_facility",
              severity = "__syslog_message_severity",
            }
          }
        }

        // APC UPS syslog receiver (non-standard format) — port 1516, exposed as 10514
        // UPS sends: <11>03/14/2026 17:35:05 apcB77CE6 APC: Test Syslog
        loki.source.syslog "apc" {
          listener {
            address       = "0.0.0.0:1516"
            protocol      = "udp"
            syslog_format = "raw"
            labels        = { source = "syslog" }
          }
          forward_to = [loki.process.apc.receiver]
        }

        loki.process "apc" {
          forward_to = [loki.write.default.receiver]

          stage.regex {
            expression = "^<\\d+>(?P<timestamp>\\d{2}/\\d{2}/\\d{4} \\d{2}:\\d{2}:\\d{2}) (?P<hostname>\\S+) (?P<message>.+)$"
          }

          stage.labels {
            values = {
              hostname = "",
            }
          }

          stage.timestamp {
            source = "timestamp"
            format = "01/02/2006 15:04:05"
          }

          stage.output {
            source = "message"
          }
        }

        // Ship logs to Loki
        loki.write "default" {
          endpoint {
            url = "http://loki.monitoring.svc:3100/loki/api/v1/push"
          }
        }

    extraPorts:
      - name: syslog-udp
        port: 1515
        targetPort: 1515
        protocol: UDP
      - name: syslog-tcp
        port: 1515
        targetPort: 1515
        protocol: TCP
      - name: apc-syslog
        port: 1516
        targetPort: 1516
        protocol: UDP

  controller:
    type: daemonset
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet

  # Alloy needs access to pod logs on the host
  mounts:
    varlog: true
