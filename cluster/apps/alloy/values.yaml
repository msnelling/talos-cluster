alloy:
  alloy:
    stabilityLevel: experimental
    configMap:
      content: |
        // Receive Talos machine logs via raw UDP (json_lines format)
        loki.source.syslog "talos" {
          listener {
            address       = "127.0.0.1:1514"
            protocol      = "udp"
            syslog_format = "raw"
            labels        = {
              source = "talos",
              node   = sys.env("HOSTNAME"),
            }
          }
          forward_to = [loki.process.talos.receiver]
        }

        // Parse Talos JSON log fields and extract labels
        loki.process "talos" {
          forward_to = [loki.write.default.receiver]

          stage.json {
            expressions = {
              msg           = "msg",
              talos_level   = "\"talos-level\"",
              talos_service = "\"talos-service\"",
              talos_time    = "\"talos-time\"",
            }
          }

          stage.timestamp {
            source = "talos_time"
            format = "2006-01-02T15:04:05.999999999Z07:00"
          }

          stage.labels {
            values = {
              level   = "talos_level",
              service = "talos_service",
            }
          }

          stage.output {
            source = "msg"
          }
        }

        // Discover and collect pod logs
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "pods" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }
        }

        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.pods.output
          forward_to = [loki.write.default.receiver]
        }

        // Receive syslog from external devices (RFC3164 / BSD syslog)
        loki.source.network "syslog_udp" {
          address       = "0.0.0.0:1515"
          protocol      = "udp"
          frame_format  = "newline_delimited"
          forward_to    = [loki.process.external.receiver]
        }

        loki.source.network "syslog_tcp" {
          address       = "0.0.0.0:1515"
          protocol      = "tcp"
          frame_format  = "newline_delimited"
          forward_to    = [loki.process.external.receiver]
        }

        loki.process "external" {
          forward_to = [loki.write.default.receiver]

          stage.static_labels {
            values = {
              source = "syslog",
            }
          }

          stage.regex {
            expression = "^<(?P<priority>\\d+)>(?P<timestamp>\\w+ +\\d+ \\d+:\\d+:\\d+) (?P<hostname>\\S+) (?P<appname>\\S+?)(?:\\[(?P<pid>\\d+)\\])?: (?P<message>.*)$"
          }

          stage.labels {
            values = {
              hostname = "",
              appname  = "",
            }
          }

          stage.timestamp {
            source = "timestamp"
            format = "Jan  2 15:04:05"
          }

          stage.output {
            source = "message"
          }
        }

        // Ship logs to Loki
        loki.write "default" {
          endpoint {
            url = "http://loki.monitoring.svc:3100/loki/api/v1/push"
          }
        }

    extraPorts:
      - name: syslog-udp
        port: 1515
        targetPort: 1515
        protocol: UDP
      - name: syslog-tcp
        port: 1515
        targetPort: 1515
        protocol: TCP

  controller:
    type: daemonset
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet

  # Alloy needs access to pod logs on the host
  mounts:
    varlog: true
