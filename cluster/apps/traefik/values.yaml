traefik:
  providers:
    kubernetesGateway:
      enabled: true
      experimentalChannel: true
    kubernetesIngress:
      enabled: false

  gateway:
    enabled: false

  ports:
    gitea-ssh:
      port: 2222
      expose:
        default: true
      exposedPort: 22
      protocol: TCP

  service:
    spec:
      loadBalancerClass: io.cilium/l2-announcer
