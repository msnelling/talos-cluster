loki:
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      retention_period: 168h  # 7 days

  singleBinary:
    replicas: 1
    persistence:
      storageClass: longhorn

  # Disable components not used in SingleBinary mode
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  # Disable canary and test pods
  lokiCanary:
    enabled: false
  test:
    enabled: false

  # Gateway is unnecessary in SingleBinary mode — clients talk directly to Loki
  gateway:
    enabled: false

  # Disable memcached caches (not needed for SingleBinary with filesystem)
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
