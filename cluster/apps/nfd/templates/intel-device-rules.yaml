apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: intel-device-rules
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/intel/intel-device-plugins-for-kubernetes
    targetRevision: v0.35.0
    path: deployments/nfd/overlays/node-feature-rules
  destination:
    server: https://kubernetes.default.svc
    namespace: nfd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
