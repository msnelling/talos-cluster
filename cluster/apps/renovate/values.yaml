renovate:
  cronjob:
    schedule: "0 * * * *"
    concurrencyPolicy: Forbid
    jobRestartPolicy: Never
    preCommand: |
      # Generate a GitHub App installation token from App ID + PEM key
      echo "Generating GitHub App installation token..."
      echo "${RENOVATE_GITHUB_APP_KEY}" > /tmp/github-app-key.pem

      NOW=$(date +%s)
      IAT=$((NOW - 60))
      EXP=$((NOW + 600))

      HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | openssl base64 -A | tr -d '=' | tr '/+' '_-')
      PAYLOAD=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$IAT" "$EXP" "$RENOVATE_GITHUB_APP_ID" | openssl base64 -A | tr -d '=' | tr '/+' '_-')
      SIGNATURE=$(printf '%s.%s' "$HEADER" "$PAYLOAD" | openssl dgst -sha256 -sign /tmp/github-app-key.pem -binary | openssl base64 -A | tr -d '=' | tr '/+' '_-')
      JWT="${HEADER}.${PAYLOAD}.${SIGNATURE}"

      INSTALLATION_ID=$(curl -sf -H "Authorization: Bearer ${JWT}" -H "Accept: application/vnd.github+json" -H "User-Agent: renovate-token-gen" https://api.github.com/app/installations | jq '.[0].id')
      export RENOVATE_TOKEN=$(curl -sf -X POST -H "Authorization: Bearer ${JWT}" -H "Accept: application/vnd.github+json" -H "User-Agent: renovate-token-gen" "https://api.github.com/app/installations/${INSTALLATION_ID}/access_tokens" | jq -r '.token')

      rm -f /tmp/github-app-key.pem
      echo "Token generated successfully."
  renovate:
    config: |
      {
        "platform": "github",
        "repositories": ["xmple/talos-cluster"],
        "onboardingConfig": {
          "extends": ["config:recommended"]
        }
      }
  existingSecret: renovate-token
