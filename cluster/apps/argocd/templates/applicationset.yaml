apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: git@github.com:xmple/talos-cluster.git
        revision: main
        files:
          - path: cluster/apps/*/config.json
  template:
    metadata:
      name: "{{ `{{.appName}}` }}"
    spec:
      project: cluster
      source:
        repoURL: git@github.com:xmple/talos-cluster.git
        targetRevision: main
        path: "{{ `{{.chartPath}}` }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ `{{.namespace}}` }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
