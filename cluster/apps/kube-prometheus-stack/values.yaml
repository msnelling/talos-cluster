kube-prometheus-stack:
  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi

  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi
      additionalScrapeConfigs:
        - job_name: kube-etcd
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            - source_labels: [__meta_kubernetes_node_label_node_role_kubernetes_io_control_plane]
              action: keep
            - source_labels: [__address__]
              regex: (.+?)(?::\d+)?
              target_label: __address__
              replacement: $1:2381
            - source_labels: [__meta_kubernetes_node_label_kubernetes_io_hostname]
              target_label: instance

  grafana:
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    persistence:
      enabled: false
    envFromSecrets:
      - name: grafana-db-secrets
        optional: false
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki.monitoring.svc:3100
        access: proxy
        isDefault: false

  # etcd scraping — Talos exposes metrics on port 2381.
  # kubeEtcd.enabled gates the etcd PrometheusRule alert rules, so we keep
  # it enabled but disable its Service/ServiceMonitor (ArgoCD's default
  # resource.exclusions skips Endpoints, breaking the ServiceMonitor).
  # Actual scraping uses additionalScrapeConfigs with node SD for dynamic
  # control-plane discovery — no hardcoded IPs.
  kubeEtcd:
    enabled: true
    service:
      enabled: false
