kube-prometheus-stack:
  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi

  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi

  grafana:
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    persistence:
      enabled: false
    envFromSecrets:
      - name: grafana-db-secrets
        optional: false
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki.monitoring.svc:3100
        access: proxy
        isDefault: false

  # etcd scraping — Talos exposes etcd metrics on port 2381
  kubeEtcd:
    enabled: true
    endpoints:
      - 10.1.1.140
      - 10.1.1.146
      - 10.1.1.203
    service:
      enabled: true
      port: 2381
      targetPort: 2381
