apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-etcd-lag
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  etcd-lag.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Apply Lag (Committed − Applied)",
          "description": "Difference between committed and applied raft proposals per node. A growing gap means that node is falling behind.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "proposals",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "thresholdsStyle": { "mode": "off" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 50 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "etcd_server_proposals_committed_total{job=\"kube-etcd\"} - etcd_server_proposals_applied_total{job=\"kube-etcd\"}",
              "legendFormat": "{{`{{ instance }}`}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Slow Applies",
          "description": "Rate of slow apply operations per node. Indicates the node's disk or CPU cannot keep up with raft log application.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "applies/s",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "thresholdsStyle": { "mode": "off" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.1 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(etcd_server_slow_apply_total{job=\"kube-etcd\"}[$__rate_interval])",
              "legendFormat": "{{`{{ instance }}`}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Proposals Pending",
          "description": "Number of pending raft proposals per node. A sustained non-zero value suggests the leader cannot commit entries fast enough.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "proposals",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "thresholdsStyle": { "mode": "off" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "etcd_server_proposals_pending{job=\"kube-etcd\"}",
              "legendFormat": "{{`{{ instance }}`}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Proposals Failed",
          "description": "Rate of failed raft proposals per node. Failures indicate leader loss or cluster quorum issues.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "failures/s",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "thresholdsStyle": { "mode": "off" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.1 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(etcd_server_proposals_failed_total{job=\"kube-etcd\"}[$__rate_interval])",
              "legendFormat": "{{`{{ instance }}`}}",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["etcd"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "prometheus" },
            "hide": 0,
            "includeAll": false,
            "label": "Data source",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "etcd Lag Monitor",
      "uid": "etcd-lag-monitor"
    }
