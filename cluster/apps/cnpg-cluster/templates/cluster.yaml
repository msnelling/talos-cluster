apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-cluster
  namespace: {{ .Release.Namespace }}
spec:
  instances: {{ .Values.instances }}

  storage:
    size: {{ .Values.storage.size }}
    storageClass: {{ .Values.storage.storageClass }}

  {{- with .Values.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- with .Values.affinity }}
  affinity:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  certificates:
    serverTLSSecret: cnpg-server-tls
    serverCASecret: cnpg-server-ca

  enableSuperuserAccess: true
  primaryUpdateMethod: switchover
  primaryUpdateStrategy: unsupervised

  {{- with .Values.managedRoles }}
  managed:
    roles:
      {{- range . }}
      - name: {{ .name }}
        ensure: present
        login: true
        {{- if .createdb }}
        createdb: true
        {{- end }}
        passwordSecret:
          name: {{ .name }}-role-password
      {{- end }}
  {{- end }}

  bootstrap:
    initdb:
      database: {{ .Values.initdb.database }}
      owner: {{ .Values.initdb.owner }}

  {{- with .Values.postgresql }}
  postgresql:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: cnpg-cluster-backup
