apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-single-replica
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  # Keep each single replica co-located with its pod's node. Combined with the
  # Cluster's required pod anti-affinity, this spreads data one-per-node and
  # makes placement self-healing (no manual rebalancing after node churn).
  dataLocality: "best-effort"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
