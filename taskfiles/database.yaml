version: "3"

tasks:

  _require-cnpg-plugin:
    internal: true
    preconditions:
      - sh: command -v kubectl-cnpg
        msg: |
          kubectl cnpg plugin is required. Install with:
            brew install kubectl-cnpg

  status:
    desc: Show CNPG cluster health and backup status
    deps: [_require-cnpg-plugin]
    cmds:
      - kubectl cnpg status cnpg-cluster -n cnpg-cluster

  backup:
    desc: Trigger an on-demand backup
    cmds:
      - |
        export TIMESTAMP=$(date +%Y%m%d%H%M%S)
        envsubst < cluster/recovery/backup.yaml | kubectl apply -f -
        echo "Backup cnpg-cluster-on-demand-${TIMESTAMP} triggered."
        echo "Monitor with: task db:backups"

  backups:
    desc: List all backups with status
    cmds:
      - kubectl get backups.postgresql.cnpg.io -n cnpg-cluster --sort-by=.metadata.creationTimestamp

  psql:
    desc: Open interactive psql shell on the primary
    deps: [_require-cnpg-plugin]
    interactive: true
    cmds:
      - kubectl cnpg psql cnpg-cluster -n cnpg-cluster

  restore:
    desc: "Restore CNPG cluster from backup (usage: task db:restore [-- \"PITR-timestamp\"])"
    deps: [_require-cnpg-plugin, ":_require-yq", ":_require-helm"]
    interactive: true
    cmds:
      - scripts/cnpg-restore.sh {{.CLI_ARGS}}

  restore-verify:
    desc: "Non-destructive DR test: restore to temp cluster, validate, cleanup (usage: task db:restore-verify [-- \"PITR-timestamp\"])"
    deps: [_require-cnpg-plugin, ":_require-yq", ":_require-helm"]
    interactive: true
    cmds:
      - scripts/cnpg-restore-verify.sh {{.CLI_ARGS}}

  migrate-pgadmin:
    desc: "Migrate pgAdmin to named Longhorn volume (preserves data)"
    interactive: true
    cmds:
      - scripts/pgadmin-migrate-volume.sh
