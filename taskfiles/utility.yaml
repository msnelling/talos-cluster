version: "3"

tasks:

  status:
    desc: Show cluster health and node status
    deps: [":_require-nodes"]
    preconditions:
      - sh: command -v cilium
        msg: "cilium CLI is required. Install with: brew install cilium-cli"
    cmds:
      - talosctl health --context {{.CLUSTER_NAME}}
      - kubectl --context admin@{{.CLUSTER_NAME}} get nodes -o wide
      - cilium status --context admin@{{.CLUSTER_NAME}}

  dashboard:
    desc: "Open Talos dashboard (usage: task utility:dashboard [-- <node-name> ...])"
    deps: [":_require-nodes"]
    interactive: true
    cmds:
      - |
        if [ -n "{{.CLI_ARGS}}" ]; then
          IPS=""
          for NODE in {{.CLI_ARGS}}; do
            IP=$(yq ".nodes[] | select(.name == \"$NODE\") | .ip" vars.yaml)
            if [ -n "$IPS" ]; then IPS="$IPS,$IP"; else IPS="$IP"; fi
          done
        else
          IPS="{{.ALL_CP_IPS | replace " " ","}}"
        fi
        exec talosctl dashboard --context {{.CLUSTER_NAME}} --nodes "$IPS"

  disks:
    desc: List disks on all nodes (useful before first install)
    deps: [":_require-nodes"]
    cmds:
      - for: { var: NODE_NAMES, as: NODE }
        task: _disks-node
        vars:
          NODE_NAME: "{{ .NODE }}"

  _disks-node:
    internal: true
    vars:
      NODE_IP:
        sh: yq '.nodes[] | select(.name == "{{.NODE_NAME}}") | .ip' vars.yaml
    cmds:
      - echo "=== {{.NODE_NAME}} ({{.NODE_IP}}) ==="
      - talosctl get disks --insecure --nodes {{.NODE_IP}}

  links:
    desc: List network interfaces on all nodes
    deps: [":_require-nodes"]
    cmds:
      - for: { var: NODE_NAMES, as: NODE }
        task: _links-node
        vars:
          NODE_NAME: "{{ .NODE }}"

  _links-node:
    internal: true
    vars:
      NODE_IP:
        sh: yq '.nodes[] | select(.name == "{{.NODE_NAME}}") | .ip' vars.yaml
    cmds:
      - echo "=== {{.NODE_NAME}} ({{.NODE_IP}}) ==="
      - talosctl get links --insecure --nodes {{.NODE_IP}}
