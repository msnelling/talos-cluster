version: "3"

tasks:

  cilium:
    desc: Install or upgrade Cilium CNI
    deps: [":_require-helm"]
    cmds:
      - helm repo add cilium https://helm.cilium.io/ --force-update
      - helm dependency build cluster/apps/cilium
      - helm upgrade --install cilium cluster/apps/cilium
          --namespace kube-system
          --force-conflicts
          --wait --timeout 5m

  traefik:
    desc: Install or upgrade Traefik
    deps: [":_require-helm"]
    cmds:
      - kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.4.0/experimental-install.yaml
          --server-side --force-conflicts
      - helm repo add traefik https://traefik.github.io/charts --force-update
      - helm dependency build cluster/apps/traefik
      - helm upgrade --install traefik cluster/apps/traefik
          --namespace traefik
          --create-namespace
          --force-conflicts
          --wait --timeout 5m

  cert-manager:
    desc: Install or upgrade cert-manager
    deps: [":_require-helm"]
    cmds:
      - kubectl create namespace cert-manager --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create secret generic cloudflare-api-token
          --namespace cert-manager
          --from-literal=api-token={{.CLOUDFLARE_API_TOKEN}}
          --dry-run=client -o yaml | kubectl apply -f -
      - helm repo add jetstack https://charts.jetstack.io --force-update
      - helm dependency build cluster/apps/cert-manager
      - helm upgrade --install cert-manager cluster/apps/cert-manager
          --namespace cert-manager
          --force-conflicts
          --wait --timeout 5m

  longhorn-secret:
    desc: Create Longhorn S3 backup secret (namespace created by ArgoCD)
    cmds:
      - kubectl create secret generic longhorn-s3-secret
          --namespace longhorn-system
          --from-literal=AWS_ACCESS_KEY_ID={{.LONGHORN_S3_ACCESS_KEY}}
          --from-literal=AWS_SECRET_ACCESS_KEY={{.LONGHORN_S3_SECRET_KEY}}
          --from-literal=AWS_ENDPOINTS={{.LONGHORN_S3_ENDPOINT}}
          --dry-run=client -o yaml | kubectl apply -f -

  argocd:
    desc: Install or upgrade ArgoCD
    deps: [":_require-helm"]
    preconditions:
      - sh: test -f argocd-repo-key
        msg: |
          argocd-repo-key file not found. Generate it with:
            ssh-keygen -t ed25519 -f argocd-repo-key -N ""
          Then add argocd-repo-key.pub as a deploy key in the GitHub repo settings.
    cmds:
      - kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create secret generic argocd-repo-key
          --namespace argocd
          --from-literal=type=git
          --from-literal=url=git@github.com:xmple/talos-cluster.git
          --from-file=sshPrivateKey=argocd-repo-key
          --dry-run=client -o yaml | kubectl apply -f -
      - kubectl label secret argocd-repo-key -n argocd argocd.argoproj.io/secret-type=repository --overwrite
      - helm repo add argo https://argoproj.github.io/argo-helm --force-update
      - helm dependency build cluster/apps/argocd
      - helm upgrade --install argocd cluster/apps/argocd
          --namespace argocd
          --set argo-cd.configs.secret.extra.dex\\.github\\.clientID={{.GITHUB_OAUTH_CLIENT_ID}}
          --set argo-cd.configs.secret.extra.dex\\.github\\.clientSecret={{.GITHUB_OAUTH_CLIENT_SECRET}}
          --force-conflicts
          --wait --timeout 5m

  db3000-secrets:
    desc: Create secrets for db3000 media apps (namespace must exist first)
    cmds:
      - kubectl create secret generic media-smb-creds
          --namespace db3000
          --from-literal=username={{.SMB_USERNAME}}
          --from-literal=password={{.SMB_PASSWORD}}
          --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create secret generic transmission-vpn-secrets
          --namespace db3000
          --from-literal=VPN_SERVICE_PROVIDER={{.VPN_SERVICE_PROVIDER}}
          --from-literal=VPN_TYPE={{.VPN_TYPE}}
          --from-literal=WIREGUARD_PRIVATE_KEY={{.VPN_WIREGUARD_PRIVATE_KEY}}
          --from-literal=WIREGUARD_ADDRESSES={{.VPN_WIREGUARD_ADDRESSES}}
          --from-literal=SERVER_CITIES={{.VPN_SERVER_CITIES}}
          --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create secret generic transmission-proxy-credentials
          --namespace db3000
          --from-literal=HTTPPROXY_USER={{.VPN_PROXY_USER}}
          --from-literal=HTTPPROXY_PASSWORD={{.VPN_PROXY_PASSWORD}}
          --dry-run=client -o yaml | kubectl apply -f -
      - yq -r '.vpn_auth_config' vars.yaml |
          kubectl create secret generic gluetun-auth-secrets
          --namespace db3000
          --from-file=config.toml=/dev/stdin
          --dry-run=client -o yaml | kubectl apply -f -

  gitea-secrets:
    desc: Create Gitea secrets (namespace created by ArgoCD)
    cmds:
      - kubectl create secret generic gitea-admin-secret
          --namespace gitea
          --from-literal=username={{.GITEA_ADMIN_USER}}
          --from-literal=password={{.GITEA_ADMIN_PASSWORD}}
          --from-literal=email={{.GITEA_ADMIN_EMAIL}}
          --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl create secret generic gitea-config-secrets \
          --namespace gitea \
          --from-literal=database="$(printf 'HOST={{.GITEA_POSTGRES_HOST}}\nNAME={{.GITEA_POSTGRES_DB}}\nUSER={{.GITEA_POSTGRES_USER}}\nPASSWD={{.GITEA_POSTGRES_PASSWORD}}')" \
          --from-literal=security="$(printf 'SECRET_KEY={{.GITEA_SECRET_KEY}}')" \
          --from-literal=mailer="$(printf 'USER={{.GITEA_SMTP_USER}}\nPASSWD={{.GITEA_SMTP_PASSWORD}}')" \
          --from-literal=storage="$(printf 'MINIO_ACCESS_KEY_ID={{.GITEA_MINIO_ACCESS_KEY}}\nMINIO_SECRET_ACCESS_KEY={{.GITEA_MINIO_SECRET_KEY}}')" \
          --dry-run=client -o yaml | kubectl apply -f -
