version: "3"

tasks:

  cilium:
    desc: Install or upgrade Cilium CNI
    deps: [":_require-helm"]
    cmds:
      - helm repo add cilium https://helm.cilium.io/ --force-update
      - helm dependency build cluster/apps/cilium
      - helm upgrade --install cilium cluster/apps/cilium
          --namespace kube-system
          --force-conflicts
          --wait --timeout 5m

  traefik:
    desc: Install or upgrade Traefik
    deps: [":_require-helm"]
    cmds:
      - kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.4.0/experimental-install.yaml
          --server-side --force-conflicts
      - helm repo add traefik https://traefik.github.io/charts --force-update
      - helm dependency build cluster/apps/traefik
      - helm upgrade --install traefik cluster/apps/traefik
          --namespace traefik
          --create-namespace
          --force-conflicts
          --wait --timeout 5m

  cert-manager:
    desc: Install or upgrade cert-manager
    deps: [":_require-helm"]
    cmds:
      - kubectl create namespace cert-manager --dry-run=client -o yaml | kubectl apply -f -
      - |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: cloudflare-api-token
          namespace: cert-manager
        type: Opaque
        stringData:
          api-token: "{{.CLOUDFLARE_API_TOKEN}}"
        EOF
      - helm repo add jetstack https://charts.jetstack.io --force-update
      - helm dependency build cluster/apps/cert-manager
      - helm upgrade --install cert-manager cluster/apps/cert-manager
          --namespace cert-manager
          --force-conflicts
          --wait --timeout 5m

  longhorn-secret:
    desc: Create Longhorn S3 backup secret (namespace created by ArgoCD)
    cmds:
      - |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: longhorn-s3-secret
          namespace: longhorn-system
        type: Opaque
        stringData:
          AWS_ACCESS_KEY_ID: "{{.LONGHORN_S3_ACCESS_KEY}}"
          AWS_SECRET_ACCESS_KEY: "{{.LONGHORN_S3_SECRET_KEY}}"
          AWS_ENDPOINTS: "{{.LONGHORN_S3_ENDPOINT}}"
        EOF

  argocd:
    desc: Install or upgrade ArgoCD
    deps: [":_require-helm"]
    preconditions:
      - sh: test -f argocd-repo-key
        msg: |
          argocd-repo-key file not found. Generate it with:
            ssh-keygen -t ed25519 -f argocd-repo-key -N ""
          Then add argocd-repo-key.pub as a deploy key in the GitHub repo settings.
    cmds:
      - kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      - kubectl create secret generic argocd-repo-key
          --namespace argocd
          --from-literal=type=git
          --from-literal=url=git@github.com:xmple/talos-cluster.git
          --from-file=sshPrivateKey=argocd-repo-key
          --dry-run=client -o yaml | kubectl apply -f -
      - kubectl label secret argocd-repo-key -n argocd argocd.argoproj.io/secret-type=repository --overwrite
      - helm repo add argo https://argoproj.github.io/argo-helm --force-update
      - helm dependency build cluster/apps/argocd
      - |
        cat <<'EOF' | helm upgrade --install argocd cluster/apps/argocd \
          --namespace argocd \
          --force-conflicts \
          --wait --timeout 5m \
          --values /dev/stdin
        argo-cd:
          configs:
            secret:
              extra:
                dex.github.clientID: "{{.GITHUB_OAUTH_CLIENT_ID}}"
                dex.github.clientSecret: "{{.GITHUB_OAUTH_CLIENT_SECRET}}"
        EOF

  db3000-secrets:
    desc: Create secrets for db3000 media apps (namespace must exist first)
    cmds:
      - |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: media-smb-creds
          namespace: db3000
        type: Opaque
        stringData:
          username: "{{.SMB_USERNAME}}"
          password: "{{.SMB_PASSWORD}}"
        EOF
      - |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: transmission-vpn-secrets
          namespace: db3000
        type: Opaque
        stringData:
          VPN_SERVICE_PROVIDER: "{{.VPN_SERVICE_PROVIDER}}"
          VPN_TYPE: "{{.VPN_TYPE}}"
          WIREGUARD_PRIVATE_KEY: "{{.VPN_WIREGUARD_PRIVATE_KEY}}"
          WIREGUARD_ADDRESSES: "{{.VPN_WIREGUARD_ADDRESSES}}"
          SERVER_CITIES: "{{.VPN_SERVER_CITIES}}"
        EOF
      - |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: transmission-proxy-credentials
          namespace: db3000
        type: Opaque
        stringData:
          HTTPPROXY_USER: "{{.VPN_PROXY_USER}}"
          HTTPPROXY_PASSWORD: "{{.VPN_PROXY_PASSWORD}}"
        EOF
      - yq -r '.vpn_auth_config' vars.yaml |
          kubectl create secret generic gluetun-auth-secrets
          --namespace db3000
          --from-file=config.toml=/dev/stdin
          --dry-run=client -o yaml | kubectl apply -f -

  gitea-secrets:
    desc: Create Gitea secrets (namespace created by ArgoCD)
    cmds:
      - |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: gitea-admin-secret
          namespace: gitea
        type: Opaque
        stringData:
          username: "{{.GITEA_ADMIN_USER}}"
          password: "{{.GITEA_ADMIN_PASSWORD}}"
          email: "{{.GITEA_ADMIN_EMAIL}}"
        EOF
      - |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: gitea-config-secrets
          namespace: gitea
        type: Opaque
        stringData:
          database: |-
            HOST={{.GITEA_POSTGRES_HOST}}
            NAME={{.GITEA_POSTGRES_DB}}
            USER={{.GITEA_POSTGRES_USER}}
            PASSWD={{.GITEA_POSTGRES_PASSWORD}}
          security: |-
            SECRET_KEY={{.GITEA_SECRET_KEY}}
          mailer: |-
            USER={{.GITEA_SMTP_USER}}
            PASSWD={{.GITEA_SMTP_PASSWORD}}
          storage: |-
            MINIO_ACCESS_KEY_ID={{.GITEA_MINIO_ACCESS_KEY}}
            MINIO_SECRET_ACCESS_KEY={{.GITEA_MINIO_SECRET_KEY}}
        EOF

  cnpg-secrets:
    desc: Create CNPG S3 backup and pgAdmin secrets (namespace created by ArgoCD)
    cmds:
      - |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: cnpg-s3-creds
          namespace: cnpg-cluster
        type: Opaque
        stringData:
          ACCESS_KEY_ID: "{{.CNPG_S3_ACCESS_KEY}}"
          ACCESS_SECRET_KEY: "{{.CNPG_S3_SECRET_KEY}}"
        EOF
      - |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: pgadmin-credentials
          namespace: cnpg-cluster
        type: Opaque
        stringData:
          password: "{{.PGADMIN_PASSWORD}}"
        EOF

  renovate-secret:
    desc: Create Renovate GitHub App secret (namespace created by ArgoCD)
    preconditions:
      - sh: test -f renovate-app-key.pem
        msg: |
          renovate-app-key.pem not found. Download it from:
            GitHub → Settings → Developer settings → GitHub Apps → your app → Generate a private key
    cmds:
      - kubectl create secret generic renovate-token
          --namespace renovate
          --from-literal=RENOVATE_GITHUB_APP_ID={{.RENOVATE_GITHUB_APP_ID}}
          --from-file=RENOVATE_GITHUB_APP_KEY=renovate-app-key.pem
          --dry-run=client -o yaml | kubectl apply -f -
